<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0;
    padding: 40px;
    font-family: var(--vscode-font-family);
    color: var(--vscode-foreground);
    background: var(--vscode-editor-background);
    display: flex;
    justify-content: center;
  }
  .container {
    max-width: 480px;
    text-align: center;
  }
  h1 {
    margin: 0 0 4px 0;
    font-size: 24px;
    font-weight: 600;
    color: var(--vscode-foreground);
  }
  .version {
    font-size: 13px;
    color: var(--vscode-descriptionForeground);
    margin-bottom: 16px;
  }
  .description {
    font-size: 14px;
    line-height: 1.5;
    color: var(--vscode-foreground);
    margin-bottom: 24px;
  }
  .features {
    text-align: left;
    margin-bottom: 24px;
  }
  .features h2 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--vscode-foreground);
  }
  .features ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .features li {
    padding: 4px 0;
    font-size: 13px;
    color: var(--vscode-foreground);
  }
  .features li::before {
    content: "\2022";
    color: var(--vscode-textLink-foreground);
    margin-right: 8px;
  }
  .divider {
    border: none;
    border-top: 1px solid var(--vscode-widget-border);
    margin: 20px 0;
  }
  .footer {
    font-size: 12px;
    color: var(--vscode-descriptionForeground);
  }
</style>
</head>
<body>
<div class="container">
  <h1>{{name}}</h1>
  <div class="version">Version {{version}}</div>
  <p class="description">{{description}}</p>

  <div class="features">
    <h2>Features</h2>
    <ul>
      <li>Live Editing</li>
      <li>Cursor &amp; Selection Sync</li>
      <li>Follow &amp; Jump to Partner</li>
      <li>Chat</li>
      <li>Shared Whiteboard</li>
      <li>Readonly Terminal Sharing</li>
      <li>Edit Access Control</li>
      <li>LAN &amp; Relay Discovery</li>
      <li>In-Memory Filesystem</li>
    </ul>
  </div>

  <hr class="divider" />
  <div class="footer">
    by <strong>{{publisher}}</strong>
  </div>
</div>
</body>
</html>
